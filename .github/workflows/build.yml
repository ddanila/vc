name: Build

on:
  push:
    branches: [build]
    paths-ignore: ['**.md']
  pull_request:
    branches: [build]
    paths-ignore: ['**.md']

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ddanila/msdos/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 15
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        version: ['4.05', '4.99.09']

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Build VC ${{ matrix.version }}
        env:
          VC_BUILD_IN_CONTAINER: '1'
        run: ./build.sh ${{ matrix.version }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vc-${{ matrix.version }}
          path: |
            build/${{ matrix.version }}/*.COM
            build/${{ matrix.version }}/*.OVL
            build/${{ matrix.version }}/stage/build.log
            build/${{ matrix.version }}/stage/debugcon.log
            build/${{ matrix.version }}/stage/serial.log
          retention-days: 14
          if-no-files-found: warn

      - name: Stage vc-${{ matrix.version }}.zip
        if: github.ref == 'refs/heads/build' && github.event_name == 'push'
        shell: bash
        run: |
          mkdir -p release-assets
          python3 - "release-assets/vc-${{ matrix.version }}.zip" \
                    "build/${{ matrix.version }}" <<'PY'
          import glob, os, sys, zipfile
          out, src = sys.argv[1], sys.argv[2]
          files = sorted(glob.glob(os.path.join(src, "*.COM")) +
                         glob.glob(os.path.join(src, "*.OVL")))
          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as z:
              for f in files:
                  z.write(f, arcname=os.path.basename(f))
                  print("+", os.path.basename(f), os.path.getsize(f), "bytes")
          PY

      - name: Capture latest commit subject
        id: changenote
        if: github.ref == 'refs/heads/build' && github.event_name == 'push'
        shell: bash
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          subject="$(printf '%s' "$MSG" | head -n1)"
          echo "subject=$subject" >> "$GITHUB_OUTPUT"

      - name: Publish to rolling 'latest-build' release
        if: github.ref == 'refs/heads/build' && github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest-build
          name: Latest build
          body: |
            Rolling pre-release built from the tip of `build`.
            Latest change: ${{ steps.changenote.outputs.subject }}
            Commit: ${{ github.sha }}
          prerelease: true
          files: release-assets/*
