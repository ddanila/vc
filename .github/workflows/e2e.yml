name: E2E

on:
  push:
    branches: [build]
  pull_request:
    branches: [build]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ddanila/msdos/ci:latest
      options: --device /dev/kvm
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        version: ['4.05', '4.99.09']

    steps:
      - name: Check out repo with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Grant KVM access
        run: chmod 666 /dev/kvm

      - name: Build VC ${{ matrix.version }}
        env:
          VC_BUILD_IN_CONTAINER: '1'
        run: ./build.sh ${{ matrix.version }}

      - name: Upload VC artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vc-${{ matrix.version }}
          path: |
            build/${{ matrix.version }}/*.COM
            build/${{ matrix.version }}/*.EXE
            build/${{ matrix.version }}/*.OVL
          retention-days: 14
          if-no-files-found: warn

      - name: Build kvikdos test binaries
        run: make build-tests

      - name: kvikdos suite (4.05)
        if: matrix.version == '4.05'
        run: make test-kvikdos-4.05

      - name: kvikdos suite (4.99.09)
        if: matrix.version == '4.99.09'
        run: make test-kvikdos-4.99.09

      - name: QEMU e2e (${{ matrix.version }})
        run: make test-qemu-${{ matrix.version }}

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-${{ matrix.version }}
          path: |
            build/${{ matrix.version }}/stage/build.log
            build/${{ matrix.version }}/stage/debugcon.log
            build/${{ matrix.version }}/stage/serial.log
            build/${{ matrix.version }}/stage/e2e/volkov-e2e-screen.log
          if-no-files-found: ignore
          retention-days: 14
